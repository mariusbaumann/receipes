Description: |
  Downloads the latest TeamViewer QuickSupport custom module.
  TV_SUBDOMAIN is the path component of the download page URL,
  e.g. 'umbag' for https://get.teamviewer.com/umbag.
Identifier: com.github.marius-baumann.download.TeamViewerQuickSupport
MinimumVersion: '2.3'
Input:
  NAME: TeamViewerQuickSupport
  TV_SUBDOMAIN: umbag
  TV_VERSION: '15'
Process:
  - Processor: com.github.marius-baumann.download.TeamViewerQuickSupport/TeamViewerQuickSupportURLProvider
    Arguments:
      TV_SUBDOMAIN: '%TV_SUBDOMAIN%'
      TV_VERSION: '%TV_VERSION%'

  - Processor: URLDownloader
    Arguments:
      url: '%url%'
      filename: TeamViewerQS.zip

  - Processor: Unarchiver
    Arguments:
      archive_path: '%pathname%'
      destination_path: '%RECIPE_CACHE_DIR%/%NAME%'
      purge_destination: true

  - Processor: EndOfCheckPhase
